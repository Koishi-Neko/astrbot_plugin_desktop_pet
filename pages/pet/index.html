<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桌宠控制页</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page">
      <h1>桌宠控制页</h1>

      <section class="card">
        <div class="card-title">
          状态
          <button id="btn-refresh" class="btn small">刷新</button>
        </div>
        <div id="status-box" class="kv">加载中…</div>
      </section>

      <section class="card">
        <div class="card-title">TTS 语音配置</div>
        <label class="row checkbox-row">
          <input type="checkbox" id="tts-enabled" />
          <span>启用语音合成（桌宠回复附带日语配音）</span>
        </label>
        <label class="row">
          <span class="label">SBV2 服务地址</span>
          <input type="text" id="tts-base-url" placeholder="http://172.18.0.1:5000" spellcheck="false" />
        </label>
        <label class="row">
          <span class="label">模型</span>
          <select id="tts-model"></select>
        </label>
        <label class="row">
          <span class="label">说话人</span>
          <select id="tts-speaker"></select>
        </label>
        <label class="row">
          <span class="label">风格</span>
          <select id="tts-style"></select>
        </label>
        <label class="row">
          <span class="label">语速（length，越大越慢）</span>
          <input type="range" id="tts-length" min="0.5" max="2" step="0.05" />
          <span id="tts-length-val" class="mono">1.00</span>
        </label>
        <div id="models-error" class="warn"></div>
        <div class="row buttons">
          <button id="btn-save" class="btn primary">保存配置</button>
          <span id="save-msg" class="msg"></span>
        </div>
      </section>

      <section class="card">
        <div class="card-title">试听（用当前选中的参数合成，不保存）</div>
        <label class="row">
          <span class="label">日语文本</span>
          <input type="text" id="test-text" value="こんにちは！今日も一緒に頑張りましょう！" />
        </label>
        <div class="row buttons">
          <button id="btn-test" class="btn">合成并播放</button>
          <span id="test-msg" class="msg"></span>
        </div>
        <audio id="test-audio" controls class="hidden"></audio>
      </section>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
